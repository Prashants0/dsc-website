<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#FFFFFF"/>
  <!-- Abstract Isometric Floor -->
  <path d="M400 500 L100 350 L400 200 L700 350 Z" fill="#F8FAFC" stroke="#E2E8F0"/>
  
  <!-- Figures Shaking Hands (Simplified Blocks) -->
  <g transform="translate(350, 250)">
     <!-- Person 1 -->
     <rect x="-60" y="-80" width="40" height="80" fill="#0A1628"/>
     <circle cx="-40" cy="-100" r="20" fill="#0A1628"/>
     <!-- Arm 1 -->
     <path d="M-40 -40 L0 -40" stroke="#0A1628" stroke-width="8"/>
     
     <!-- Person 2 -->
     <rect x="20" y="-80" width="40" height="80" fill="#00D4AA"/>
     <circle cx="40" cy="-100" r="20" fill="#00D4AA"/>
     <!-- Arm 2 -->
     <path d="M40 -40 L0 -40" stroke="#00D4AA" stroke-width="8"/>
  </g>
  
  <!-- Floating Charts/Certificates -->
  <rect x="500" y="100" width="120" height="80" fill="#F1F5F9" stroke="#CBD5E1"/>
  <path d="M510 160 L540 130 L570 150 L610 110" stroke="#22C55E" stroke-width="4" fill="none"/>
</svg>
