<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- MToken - purple/violet brand -->
  <defs>
    <linearGradient id="mt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6A1B9A"/>
      <stop offset="100%" stop-color="#8E24AA"/>
    </linearGradient>
  </defs>
  <!-- M in rounded square -->
  <rect x="6" y="8" width="26" height="26" rx="6" fill="url(#mt-grad)"/>
  <text x="19" y="26" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#fff" font-weight="800" text-anchor="middle">M</text>
  <!-- Text -->
  <text x="38" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#6A1B9A" font-weight="700" letter-spacing="0.3">M</text>
  <text x="51" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#333" font-weight="600" letter-spacing="0.3">Token</text>
  <text x="38" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="7" fill="#888" letter-spacing="1.5">USB CRYPTO TOKEN</text>
</svg>
