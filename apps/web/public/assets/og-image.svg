<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A1628"/>
  
  <!-- Subtle Grid Overlay -->
  <defs>
    <pattern id="smallGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#smallGrid)" opacity="0.3"/>
  
  <!-- Glowing Shield Icon (Left) -->
  <g transform="translate(150, 165) scale(2)">
    <path d="M0 120 L-60 90 L-60 40 L0 10 L60 40 L60 90 Z" fill="#00D4AA" fill-opacity="0.2" stroke="#00D4AA" stroke-width="4"/>
    <path d="M0 30 L0 100" stroke="#00D4AA" stroke-width="4" opacity="0.5"/>
    <!-- Checkmark inside shield -->
    <path d="M-20 60 L0 80 L20 40" stroke="#FFFFFF" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Glow -->
    <circle cx="0" cy="65" r="80" fill="#00D4AA" fill-opacity="0.1"/>
  </g>
  
  <!-- Text Content (Right) -->
  <text x="500" y="280" font-family="Arial, sans-serif" font-weight="bold" font-size="64" fill="#FFFFFF">Get Your DSC in</text>
  <text x="500" y="360" font-family="Arial, sans-serif" font-weight="bold" font-size="64" fill="#00D4AA">30 Minutes</text>
  
  <!-- Brand (Bottom Left) -->
  <text x="60" y="580" font-family="Arial, sans-serif" font-weight="bold" font-size="32" fill="#FFFFFF">Sign<tspan fill="#00D4AA">Secure</tspan></text>
</svg>
