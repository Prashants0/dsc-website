<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1920" height="1080" fill="#0A1628"/>
  
  <!-- Subtle Grid Pattern -->
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1"/>
  </pattern>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.3"/>

  <!-- Abstract Geometric Shapes (Floating Particles) -->
  <circle cx="200" cy="200" r="4" fill="#00D4AA" opacity="0.6">
    <animate attributeName="cy" values="200;190;200" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1600" cy="800" r="6" fill="#F59E0B" opacity="0.5">
    <animate attributeName="cy" values="800;790;800" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="900" r="3" fill="#00D4AA" opacity="0.4"/>
  <rect x="1700" y="100" width="20" height="20" stroke="#00D4AA" stroke-width="2" fill="none" transform="rotate(45 1710 110)" opacity="0.3"/>

  <!-- Main Composition: Isometric Certificate and Shield -->
  <g transform="translate(960, 540) scale(1.2)">
    <!-- Base Platform -->
    <path d="M0 200 L-200 100 L0 0 L200 100 Z" fill="#1E293B" stroke="#00D4AA" stroke-width="2" stroke-opacity="0.5"/>
    <path d="M-200 100 L-200 120 L0 220 L0 200 Z" fill="#0F172A"/>
    <path d="M0 220 L200 120 L200 100 L0 200 Z" fill="#1E293B"/>

    <!-- Digital Certificate (Isometric Paper) -->
    <g transform="translate(0, -50)">
      <path d="M0 160 L-140 90 L0 20 L140 90 Z" fill="#FFFFFF" opacity="0.9"/>
      <path d="M-140 90 L-140 95 L0 165 L0 160 Z" fill="#E2E8F0"/>
      <path d="M0 165 L140 95 L140 90 L0 160 Z" fill="#F1F5F9"/>
      
      <!-- Lines on Certificate -->
      <path d="M-80 80 L80 80" stroke="#CBD5E1" stroke-width="2" transform="rotate(-26.5) translate(0 10)"/> <!-- Approximate isometric angle -->
      <path d="M-80 95 L80 95" stroke="#CBD5E1" stroke-width="2" transform="rotate(-26.5) translate(0 10)"/>
      <path d="M-80 110 L40 110" stroke="#CBD5E1" stroke-width="2" transform="rotate(-26.5) translate(0 10)"/>
    </g>

    <!-- Floating Shield Hologram -->
    <g transform="translate(0, -120)">
      <path d="M0 120 L-60 90 L-60 40 L0 10 L60 40 L60 90 Z" fill="url(#shieldGradient)" stroke="#00D4AA" stroke-width="2"/>
      <path d="M0 30 L0 100" stroke="#00D4AA" stroke-width="2" opacity="0.5"/>
      <path d="M-40 50 L0 70 L40 50" stroke="#00D4AA" stroke-width="2" fill="none"/>
      
      <!-- Glow Effect -->
      <circle cx="0" cy="65" r="50" fill="url(#glowGradient)" opacity="0.4"/>
    </g>
    
    <!-- Floating Lock Icon -->
    <g transform="translate(80, -80)">
       <rect x="-15" y="-10" width="30" height="20" rx="2" fill="#F59E0B"/>
       <path d="M-10 -10 V -20 A 10 10 0 0 1 10 -20 V -10" stroke="#F59E0B" stroke-width="4" fill="none"/>
    </g>
  </g>

  <!-- Gradients -->
  <defs>
    <linearGradient id="shieldGradient" x1="0" y1="10" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0.8"/>
    </linearGradient>
    <radialGradient id="glowGradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="scale(50)">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
