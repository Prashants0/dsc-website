<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone Frame -->
  <rect x="100" y="20" width="200" height="360" rx="20" fill="#FFFFFF" stroke="#0F172A" stroke-width="8"/>
  <rect x="180" y="35" width="40" height="4" rx="2" fill="#CBD5E1"/> <!-- Speaker -->
  <circle cx="200" cy="360" r="10" fill="none" stroke="#CBD5E1" stroke-width="2"/> <!-- Home Button -->
  
  <!-- Header -->
  <rect x="104" y="50" width="192" height="40" fill="#00D4AA"/>
  <text x="120" y="75" font-family="Arial" font-size="14" fill="#FFFFFF" font-weight="bold">Support Agent</text>
  
  <!-- Chat Bubbles -->
  <!-- Received -->
  <rect x="120" y="110" width="120" height="30" rx="8" fill="#F1F5F9"/>
  <text x="130" y="130" font-family="Arial" font-size="10" fill="#334155">Hi, I need a DSC.</text>
  
  <!-- Sent -->
  <rect x="160" y="150" width="120" height="40" rx="8" fill="#DCFCE7"/>
  <text x="170" y="170" font-family="Arial" font-size="10" fill="#14532D">Sure! Which type?</text>
  
  <!-- Received -->
  <rect x="120" y="200" width="140" height="30" rx="8" fill="#F1F5F9"/>
  <text x="130" y="220" font-family="Arial" font-size="10" fill="#334155">Class 3 for Tender.</text>
</svg>
