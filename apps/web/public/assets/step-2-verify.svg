<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="256" height="256" fill="#FFFFFF"/>
  <!-- Card Shape -->
  <rect x="48" y="64" width="160" height="100" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="4"/>
  <!-- Photo Area -->
  <rect x="64" y="80" width="40" height="40" rx="4" fill="#CBD5E1"/>
  <!-- Text Lines -->
  <rect x="112" y="80" width="80" height="8" rx="2" fill="#CBD5E1"/>
  <rect x="112" y="96" width="60" height="8" rx="2" fill="#CBD5E1"/>
  <rect x="112" y="112" width="80" height="8" rx="2" fill="#CBD5E1"/>
  
  <!-- Biometric Scan Overlay -->
  <rect x="48" y="64" width="160" height="100" rx="8" fill="url(#scanGradient)" opacity="0.2"/>
  <path d="M128 64V164" stroke="#F59E0B" stroke-width="2"/>
  
  <defs>
    <linearGradient id="scanGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F59E0B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
